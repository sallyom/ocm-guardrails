# Deployment: openclaw
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '18789'
    spec:
      serviceAccountName: openclaw-oauth-proxy
      initContainers:
      - name: init-config
        image: registry.redhat.io/ubi9-minimal:latest
        command:
        - sh
        - -c
        - |
          # Copy main config
          cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          chmod 644 /home/node/.openclaw/openclaw.json

          # Link workspace
          ln -sf /workspace /home/node/.openclaw/workspace

          # Create agent directories
          mkdir -p /workspace/agents/philbot
          mkdir -p /workspace/agents/techbot
          mkdir -p /workspace/agents/poetbot
          mkdir -p /workspace/agents/adminbot
          mkdir -p /workspace/skills/moltbook

          # Copy agent configs
          cp /agents/philbot/AGENTS.md /workspace/agents/philbot/AGENTS.md || true
          cp /agents/techbot/AGENTS.md /workspace/agents/techbot/AGENTS.md || true
          cp /agents/poetbot/AGENTS.md /workspace/agents/poetbot/AGENTS.md || true
          cp /agents/adminbot/AGENTS.md /workspace/agents/adminbot/AGENTS.md || true

          # Copy Moltbook skill
          cp /skills/moltbook/SKILL.md /workspace/skills/moltbook/SKILL.md || true

          # Create environment files with API keys for each agent
          echo "MOLTBOOK_API_URL=http://moltbook-api.moltbook.svc.cluster.local:3000" > /workspace/agents/philbot/.env
          echo "MOLTBOOK_API_KEY=${PHILBOT_KEY}" >> /workspace/agents/philbot/.env
          echo "AGENT_NAME=PhilBot" >> /workspace/agents/philbot/.env

          echo "MOLTBOOK_API_URL=http://moltbook-api.moltbook.svc.cluster.local:3000" > /workspace/agents/techbot/.env
          echo "MOLTBOOK_API_KEY=${TECHBOT_KEY}" >> /workspace/agents/techbot/.env
          echo "AGENT_NAME=TechBot" >> /workspace/agents/techbot/.env

          echo "MOLTBOOK_API_URL=http://moltbook-api.moltbook.svc.cluster.local:3000" > /workspace/agents/poetbot/.env
          echo "MOLTBOOK_API_KEY=${POETBOT_KEY}" >> /workspace/agents/poetbot/.env
          echo "AGENT_NAME=PoetBot" >> /workspace/agents/poetbot/.env

          echo "MOLTBOOK_API_URL=http://moltbook-api.moltbook.svc.cluster.local:3000" > /workspace/agents/adminbot/.env
          echo "MOLTBOOK_API_KEY=${ADMINBOT_KEY}" >> /workspace/agents/adminbot/.env
          echo "AGENT_NAME=AdminBot" >> /workspace/agents/adminbot/.env

          # Create symlinks to shared skills for each agent
          ln -sf ../../skills /workspace/agents/philbot/skills
          ln -sf ../../skills /workspace/agents/techbot/skills
          ln -sf ../../skills /workspace/agents/poetbot/skills
          ln -sf ../../skills /workspace/agents/adminbot/skills

          # Set permissions (for arbitrary UID in OpenShift)
          chmod -R 777 /workspace

          ls -la /home/node/.openclaw/
          ls -la /workspace/
        env:
        - name: PHILBOT_KEY
          valueFrom:
            secretKeyRef:
              name: philbot-moltbook-key
              key: api_key
              optional: true
        - name: TECHBOT_KEY
          valueFrom:
            secretKeyRef:
              name: techbot-moltbook-key
              key: api_key
              optional: true
        - name: POETBOT_KEY
          valueFrom:
            secretKeyRef:
              name: poetbot-moltbook-key
              key: api_key
              optional: true
        - name: ADMINBOT_KEY
          valueFrom:
            secretKeyRef:
              name: adminbot-moltbook-key
              key: api_key
              optional: true
        volumeMounts:
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: config-template
          mountPath: /config
        - name: workspace-volume
          mountPath: /workspace
        - name: philbot-agent
          mountPath: /agents/philbot
        - name: techbot-agent
          mountPath: /agents/techbot
        - name: poetbot-agent
          mountPath: /agents/poetbot
        - name: adminbot-agent
          mountPath: /agents/adminbot
        - name: moltbook-skill
          mountPath: /skills/moltbook
      containers:
      - name: oauth-proxy
        image: quay.io/openshift/origin-oauth-proxy:4.14
        args:
        - --http-address=:8443
        - --https-address=
        - --provider=openshift
        - --upstream=http://localhost:18789
        - --client-id=openclaw
        - --client-secret-file=/etc/oauth/config/client-secret
        - --cookie-secret-file=/etc/oauth/config/cookie_secret
        - --cookie-expire=23h0m0s
        - --pass-access-token
        - --scope=user:full
        - --openshift-delegate-urls={"/":{"resource":"projects","verb":"list"}}
        - --skip-auth-regex=^/metrics
        ports:
        - containerPort: 8443
          name: oauth-ui
        volumeMounts:
        - name: oauth-config
          mountPath: /etc/oauth/config
        - name: proxy-tls
          mountPath: /etc/tls/private
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: oauth-ui
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: oauth-ui
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - name: gateway
        image: quay.io/sallyom/openclaw:latest
        imagePullPolicy: Always
        command:
        - node
        - /app/dist/index.js
        - gateway
        - run
        - --bind
        - lan
        - --port
        - '18789'
        - --verbose
        ports:
        - name: gateway
          containerPort: 18789
          protocol: TCP
        - name: bridge
          containerPort: 18790
          protocol: TCP
        env:
        - name: HOME
          value: /home/node
        - name: OPENCLAW_CONFIG_DIR
          value: /home/node/.openclaw
        - name: OPENCLAW_CLI_PATH
          value: /app/dist/index.js
        - name: TERM
          value: xterm-256color
        - name: NODE_ENV
          value: production
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: MLFLOW_TRACKING_URI
              optional: true
        - name: LANGFUSE_HOST
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: LANGFUSE_HOST
              optional: true
        - name: LANGFUSE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: LANGFUSE_PUBLIC_KEY
              optional: true
        - name: LANGFUSE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: LANGFUSE_SECRET_KEY
              optional: true
        - name: OTEL_SERVICE_NAME
          value: openclaw
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 1000m
#         livenessProbe:
#           httpGet:
#             path: /
#             port: 18789
#           initialDelaySeconds: 30
#           periodSeconds: 10
#           timeoutSeconds: 5
#           failureThreshold: 3
#         readinessProbe:
#           httpGet:
#             path: /
#             port: 18789
#           initialDelaySeconds: 10
#           periodSeconds: 5
#           timeoutSeconds: 3
        volumeMounts:
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: workspace-volume
          mountPath: /workspace
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: oauth-config
        secret:
          secretName: openclaw-oauth-config
      - name: proxy-tls
        secret:
          secretName: openclaw-proxy-tls
      - name: openclaw-home
        persistentVolumeClaim:
          claimName: openclaw-home-pvc
      - name: config-template
        configMap:
          name: openclaw-config
      - name: workspace-volume
        persistentVolumeClaim:
          claimName: openclaw-workspace-pvc
      # Agent configs
      - name: philbot-agent
        configMap:
          name: philbot-agent
          optional: true
      - name: techbot-agent
        configMap:
          name: techbot-agent
          optional: true
      - name: poetbot-agent
        configMap:
          name: poetbot-agent
          optional: true
      - name: adminbot-agent
        configMap:
          name: adminbot-agent
          optional: true
      # Moltbook skill
      - name: moltbook-skill
        configMap:
          name: moltbook-skill
          optional: true
